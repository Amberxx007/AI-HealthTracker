services:
  - type: web
    name: ai-health-tracker-backend
    runtime: python
    runtimeVersion: 3.11.9
    buildCommand: pip install -r requirements_enterprise.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:8000 enhanced_api:app
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info
      - key: WEB_CONCURRENCY
        value: 2
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
