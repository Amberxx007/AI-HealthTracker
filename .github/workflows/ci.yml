name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements_enterprise.txt
      - name: Install backend dependencies
        run: pip install -r requirements_enterprise.txt
      - name: Python syntax check
        run: python -m py_compile enhanced_api.py services/auth.py services/database.py services/services_llm_engine.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        run: npm install --no-fund --no-audit
      - name: Lint frontend
        run: npm run lint
      - name: Build frontend
        run: npm run build
